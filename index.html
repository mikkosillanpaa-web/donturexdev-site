    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;

        body::before {
            content: "";

            animation: floatGlow 12s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes floatGlow {
            from { transform: translate(0,0) scale(1); }

        }

            text-align: center;

    </style>

<body>
<header>
    <img src="images/donturex_logo.png" alt="DontureX Development - Indie Android game studio logo">
    <div class="tagline">Indie Android Game Development — Clean. Focused. Addictive.</div>
</header>

<main>
    <div class="container">
        <div class="games-grid" id="gamesGrid"></div>
    </div>
</main>

<footer>
    © 2026 DontureX Development. All rights reserved.
    <div class="social-links">
        <a href="https://www.facebook.com/profile.php?id=61588318912863">Facebook</a> |
        <a href="https://www.tiktok.com/@donturex5">TikTok</a> |
        <a href="mailto:support@donturexdev.fi">Contact</a>
    </div>
</footer>

<!-- Popup for "Coming Soon" -->
<div class="popup-overlay" id="comingSoonPopup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-content">
        <div class="popup-title" id="popupTitle">Coming Soon</div>
        <div class="popup-text" id="popupText">
            <!-- Täytetään JS:llä app-kohtaisella tekstillä -->
        </div>
        <button class="popup-button" id="popupCloseBtn">OK</button>
    </div>
</div>

<script>
    const games = [
        {
            title: "Memory Trail",
            description: "Test your memory and focus in this minimalist and addictive Android game experience.",
            url: "/memorytrail/",
            badge: "memorytrail/images/logo.png",
            comingSoon: false,
            comingSoonPopup: false
        },
        {
            title: "SCORE: 125",
            description: "A universal scoreboard app for any game — fast, clean, fully offline.",
            url: "/score125/",
            badge: "score125/images/logo.png",
            comingSoon: false,
            comingSoonPopup: false
        },
        {
            title: "PuzzLoop",
            description: "Daily brain puzzles set in a lush jungle world. Memory, logic and bottle-sorting mini games in one colorful package.",
            url: "/puzzloop/index.html",
            badge: "puzzloop/images/puzzloop_icon.png",
            comingSoon: true,
            comingSoonPopup: false   // link goes to the page, label "In testing"
        },
        {
            title: "GymTracker",
            description: "Track your workouts, follow your progress and keep your training organized — a clean companion for your gym sessions.",
            url: "",
            badge: "gymtracker/images/ic_GymApp.png",
            comingSoon: true,
            comingSoonPopup: true,   // clicking shows popup "Coming Soon!"
            popupMessage: "GymTracker is currently in development.<br>Stay tuned – more information will be available soon!"
        },
        {
            title: "Dashboard Camera",
            description: "Record your drives, capture incidents and keep your journeys safely stored with an easy-to-use dashboard camera app.",
            url: "",
            badge: "dashboard_camera/images/ic_DashCam.png",
            comingSoon: true,
            comingSoonPopup: true,
            popupMessage: "Dashboard Camera is currently in development.<br>Stay tuned – more information will be available soon!"
        }
    ];

    const grid = document.getElementById("gamesGrid");
    const popup = document.getElementById("comingSoonPopup");
    const popupCloseBtn = document.getElementById("popupCloseBtn");
    const popupText = document.getElementById("popupText");

    function openPopup(message) {
        if (popupText) {
            popupText.innerHTML = message;
        }
        popup.style.display = "flex";
    }

    function closePopup() {
        popup.style.display = "none";
    }

    if (popupCloseBtn) {
        popupCloseBtn.addEventListener("click", closePopup);
    }

    if (popup) {
        popup.addEventListener("click", (e) => {
            if (e.target === popup) {
                closePopup();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closePopup();
            }
        });
    }

    if (grid) {
        games.forEach((game) => {
            const card = document.createElement("div");
            card.className = "game-card";

            let linksHtml = "";

            // PuzzLoop: in testing, goes to its URL
            if (game.comingSoon && !game.comingSoonPopup) {
                linksHtml = `
                    <a href="${game.url}" class="coming-soon-label" aria-label="${game.title} is in testing">
                        <span>In testing</span>
                    </a>
                `;
            }

            // GymTracker, Dashboard Camera: coming soon → open popup
            if (game.comingSoon && game.comingSoonPopup) {
                linksHtml = `
                    <button type="button"
                            class="coming-soon-label"
                            data-coming-soon="true"
                            data-popup-message="${encodeURIComponent(game.popupMessage || '')}"
                            aria-label="${game.title} is coming soon">
                        <span>Coming soon</span>
                    </button>
                `;
            }

            // Normal "Learn more" for non-comingSoon games
            if (!game.comingSoon && game.url) {
                linksHtml = `
                    <div class="game-links">
                        <a href="${game.url}" aria-label="Learn more about ${game.title}">Learn More →</a>
                    </div>
                `;
            }

            let badgeHtml = "";

            // GymTracker & Dashboard Camera: clicking badge also opens popup
            if (game.comingSoonPopup) {
                badgeHtml = `
                    <img class="play-badge"
                         src="${game.badge}"
                         alt="${game.title} logo"
                         loading="lazy"
                         data-coming-soon="true"
                         data-popup-message="${encodeURIComponent(game.popupMessage || '')}">
                `;
            } else if (game.url) {
                badgeHtml = `
                    <a href="${game.url}" aria-label="${game.title}">
                        <img class="play-badge" src="${game.badge}" alt="${game.title} logo" loading="lazy">
                    </a>
                `;
            } else {
                badgeHtml = `
                    <img class="play-badge" src="${game.badge}" alt="${game.title} logo" loading="lazy">
                `;
            }

            card.innerHTML = `
                <h2>${game.title}</h2>
                <p>${game.description}</p>
                ${linksHtml}
                ${badgeHtml}
            `;

            grid.appendChild(card);
        });

        // Delegate click events for all "coming soon" elements (GymTracker + Dashboard Camera)
        grid.addEventListener("click", (e) => {
            const target = e.target.closest("[data-coming-soon]");
            if (target) {
                e.preventDefault();
                const encoded = target.getAttribute("data-popup-message") || "";
                const message = decodeURIComponent(encoded) || "This app is coming soon. Stay tuned!";
                openPopup(message);
            }
        });
    }
</script>
</body>
</html>
